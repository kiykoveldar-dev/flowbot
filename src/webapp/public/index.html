<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FlowBot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">FlowBot</h1>
        <span class="streak-badge" id="streakBadge">🔥 0</span>
      </div>
      <button type="button" class="icon-btn" id="helpBtn" aria-label="Справка">?</button>
    </header>

    <section class="today-section">
      <div class="section-header">
        <h2>Сегодня</h2>
        <span class="date-label" id="dateLabel"></span>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <button type="button" class="add-btn" id="addTaskBtn">+ Добавить цель</button>
    </section>

    <section class="week-section">
      <h2 class="week-title">Неделя</h2>
      <div class="week-calendar" id="weekCalendar"></div>
    </section>
  </div>

  <div class="modal" id="taskModal">
    <form id="taskForm" method="</div>">
      <h3>Новая цель</h3>
      <input type="text" id="taskInput" placeholder="Что сделаешь сегодня?" maxlength="120" autocomplete="off" />
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelTask">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить</button>
      </div>
    </form>
  </</div>>

  <div class="loading" id="loading">Загрузка…</div>

  <script src="script.js"></script>
</body>
</html>
